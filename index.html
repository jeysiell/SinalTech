<!DOCTYPE html>
<html lang="pt-BR" class="transition-colors duration-500">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SinalTech Enterprise</title>

    <!-- 🔧 Config Dark Mode -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <style>
      @keyframes signalFlash {
        0% {
          background-color: #0f172a;
        }
        50% {
          background-color: #1d4ed8;
        }
        100% {
          background-color: #0f172a;
        }
      }

      .signal-active {
        animation: signalFlash 1s ease-in-out 3;
      }

      @keyframes pulseScale {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.08);
        }
        100% {
          transform: scale(1);
        }
      }

      .pulse-signal {
        animation: pulseScale 0.6s ease-in-out 3;
      }

      /* Animação do ícone pulsando */
      @keyframes pulseAudio {
        0% {
          transform: scale(0.9);
          opacity: 0.5;
        }
        50% {
          transform: scale(1.2);
          opacity: 1;
        }
        100% {
          transform: scale(0.9);
          opacity: 0.5;
        }
      }

      .playing-icon {
        display: none; /* Escondido por padrão */
        color: #3b82f6;
        animation: pulseAudio 1s infinite;
      }

      /* Quando a linha tiver a classe 'row-playing' */
      .row-playing {
        background-color: rgba(59, 130, 246, 0.15) !important;
        transition: all 0.3s ease;
      }

      .row-playing .playing-icon {
        display: inline-block;
      }
    </style>
  </head>

  <body
    class="bg-slate-100 dark:bg-slate-950 dark:text-white min-h-screen flex transition-colors duration-500"
  >
    <!-- ================= OVERLAY ================= -->
    <div
      id="overlayWakeup"
      class="fixed inset-0 bg-slate-950/90 backdrop-blur-md flex items-center justify-center z-50"
    >
      <div
        class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl p-8 w-[90%] max-w-md text-center space-y-6"
      >
        <div
          id="wakeIcon"
          class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto"
        ></div>

        <div>
          <h2 class="text-2xl font-bold dark:text-white">
            Inicializando Sistema
          </h2>
          <p id="statusWake" class="text-slate-500 dark:text-slate-400 mt-2">
            Conectando à API...
          </p>
        </div>

        <button
          id="btnWakeOk"
          disabled
          class="w-full py-3 rounded-xl bg-slate-700 opacity-50 cursor-not-allowed text-white font-semibold transition"
        >
          OK
        </button>
      </div>
    </div>

    <!-- ================= SIDEBAR ================= -->
    <aside
      id="sidebar"
      class="fixed md:static inset-y-0 left-0 w-64 bg-slate-900 text-white transform -translate-x-full md:translate-x-0 transition duration-300 z-40 flex flex-col"
    >
      <div
        class="px-6 py-6 border-b border-slate-800 flex justify-between items-center"
      >
        <h2 class="text-2xl font-bold">Sinal CAB</h2>
        <button id="closeSidebar" class="md:hidden text-xl">✕</button>
      </div>

      <nav class="flex-1 px-4 py-6 space-y-2">
        <a class="flex items-center gap-3 px-4 py-3 rounded-xl bg-slate-800">
          <i class="fas fa-chart-line"></i> Dashboard
        </a>
      </nav>
    </aside>

    <div class="flex-1 flex flex-col">
      <!-- ================= HEADER ================= -->
      <header
        class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-8 py-4 flex justify-between items-center"
      >
        <div class="flex items-center gap-4">
          <button id="menuBtn" class="md:hidden text-2xl">
            <i class="fas fa-bars"></i>
          </button>

          <div
            id="bellIcon"
            class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-md"
          >
            <i class="fas fa-bell text-white"></i>
          </div>

          <h1 class="text-xl font-semibold dark:text-white">
            Painel de Controle
          </h1>
        </div>

        <div class="flex items-center gap-6">
          <div class="text-sm bg-slate-900 text-white px-4 py-2 rounded-lg">
            Próximo em:
            <span id="countdown" class="font-bold ml-1">--:--</span>
          </div>

          <!-- 🌙 DARK MODE -->
          <button
            id="darkToggle"
            class="bg-slate-200 dark:bg-slate-800 px-3 py-2 rounded-lg transition"
          >
            🌙
          </button>

          <div class="text-lg font-semibold dark:text-white">
            <span id="currentTime">--:--:--</span>
          </div>
        </div>
      </header>

      <!-- ================= MAIN ================= -->
      <main class="flex-1 p-8 space-y-8">
        <section
          class="bg-white dark:bg-slate-900 border border-blue-200 dark:border-slate-800 rounded-xl p-6 mb-8"
        >
          <div class="flex items-center gap-3 mb-4">
            <i class="fas fa-hand-pointer text-blue-500"></i>
            <h3 class="text-lg font-bold">Acionamento Manual</h3>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
              <label
                class="block text-xs uppercase text-slate-500 mb-2 font-semibold"
                >Escolher Som</label
              >
              <select
                id="manualMusic"
                class="w-full px-4 py-2.5 rounded-lg border dark:bg-slate-800 dark:border-slate-700"
              >
                <option value="musica1.mp3">🎵 Tu Me Sondas</option>
                <option value="musica2.mp3">🎵 Eu Amo Minha Escola</option>
                <option value="musica3.mp3">🎵 My Lighthouse</option>
                <option value="musica4.mp3">🎵 Amor Teimoso</option>
                <option value="musica5.mp3">🎵 Minha vida e uma viagem</option>
                <option value="musica6.mp3">🎵 A Biblia</option>
              </select>
            </div>

            <div>
              <label
                class="block text-xs uppercase text-slate-500 mb-2 font-semibold"
                >Duração (segundos)</label
              >
              <input
                id="manualDuration"
                type="number"
                value="12"
                min="1"
                max="60"
                readonly
                class="w-full px-4 py-2.5 rounded-lg border bg-slate-100 dark:bg-slate-800/50 dark:border-slate-700 cursor-not-allowed outline-none"
              />
            </div>

            <div class="flex items-end">
              <button
                id="btnManualPlay"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-600/20"
              >
                <i class="fas fa-play"></i> Tocar Sinal Agora
              </button>
            </div>
          </div>
        </section>
        <!-- STATUS CARDS -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div
            class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-6"
          >
            <p class="text-xs uppercase tracking-wide text-slate-500">
              Último Sinal
            </p>
            <h2 id="currentSignalTime" class="text-4xl font-bold mt-2">
              --:--
            </h2>
            <p id="currentSignalName" class="text-slate-500 mt-2">
              Aguardando...
            </p>
          </div>

          <div
            class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-6"
          >
            <p class="text-xs uppercase tracking-wide text-slate-500">
              Próximo Sinal
            </p>
            <h2 id="nextSignalTime" class="text-4xl font-bold mt-2">--:--</h2>
            <p id="nextSignalName" class="text-slate-500 mt-2">Carregando...</p>
          </div>
        </div>

        <!-- TABELA -->
        <div
          class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-6 space-y-6"
        >
          <div
            class="flex flex-col md:flex-row md:items-center md:justify-between gap-4"
          >
            <h3 class="text-lg font-semibold dark:text-white">
              Filtros de Sinais
            </h3>

            <div class="flex gap-3">
              <select
                id="periodFilter"
                class="px-4 py-2 border rounded-lg bg-white dark:bg-slate-800 dark:border-slate-700"
              >
                <option value="morning">Manhã</option>
                <option value="afternoon">Tarde</option>
                <option value="afternoonFriday">Sexta Especial</option>
              </select>

              <input
                type="text"
                id="searchSignal"
                placeholder="Buscar por nome..."
                class="px-4 py-2 border rounded-lg bg-white dark:bg-slate-800 dark:border-slate-700"
              />
            </div>
          </div>

          <div class="overflow-x-auto">
            <h2 id="currentPeriodName" class="text-xl font-bold mb-4"></h2>

            <table class="w-full text-sm border-collapse">
              <thead class="border-b border-slate-200 dark:border-slate-800">
                <tr class="text-left">
                  <th class="py-3 w-12">Status</th>
                  <th class="py-3">Hora</th>
                  <th>Nome</th>
                  <th>Música</th>
                  <th>Duração</th>
                </tr>
              </thead>

              <tbody id="scheduleTable-morning"></tbody>
              <tbody id="scheduleTable-afternoon" class="hidden"></tbody>
              <tbody id="scheduleTable-afternoonFriday" class="hidden"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <!-- ================= JS ================= -->
    <script src="./config/js/index.js"></script>
  </body>
</html>
